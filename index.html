<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Piano" />
<meta name="theme-color" content="#191A1B" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icon-180.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=DM+Sans:wght@400;500;600;700&family=EB+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">
<title>Piano — Pratique</title>
<style>
:root{
  --bg:#191A1B; --surface:#242833; --surface2:#2E3242; --border:#515060;
  --t2:#9B97A8; --tc:#B9B5C3; --tp:#EDEBF2; --acc:#9E93F2; --gold:#E4C58A;
  --serif:'Playfair Display',Georgia,serif; --sans:'DM Sans',-apple-system,sans-serif; --num:'EB Garamond',Georgia,serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--tp);font-family:var(--sans);
  -webkit-font-smoothing:antialiased;overscroll-behavior-y:none;}
body{max-width:430px;margin:0 auto;min-height:100vh;position:relative;}
button{font-family:inherit;color:inherit;background:none;border:none;cursor:pointer;}
input,textarea,select{font-family:var(--sans);font-size:16px;color:var(--tp);background:var(--surface2);
  border:1px solid transparent;border-radius:12px;padding:12px 14px;width:100%;min-width:0;max-width:100%;outline:none;}
textarea{resize:vertical;min-height:74px;line-height:1.5;}
input:focus,textarea:focus{border-color:var(--acc);}
::placeholder{color:var(--t2);opacity:.7;}
.num{font-family:var(--num);font-variant-numeric:tabular-nums;}
.serif{font-family:var(--serif);letter-spacing:-.01em;}
.app{padding:calc(env(safe-area-inset-top) + 16px) 20px calc(104px + env(safe-area-inset-bottom));}
.screen{display:none;animation:fade .25s ease;}
.screen.active{display:block;}
@keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
h1{font-family:var(--serif);font-weight:400;font-size:34px;margin:2px 0;letter-spacing:-.01em;color:var(--tp);}
h2{font-family:var(--serif);font-weight:400;font-size:21px;margin:26px 0 12px;color:var(--tp);}
.eyebrow{color:var(--t2);font-size:13px;margin:0 0 4px;}
.muted{color:var(--t2);} .clair{color:var(--tc);}
.card{background:var(--surface);border-radius:16px;padding:18px;}
.card.hi{background:var(--surface);border:1px solid var(--surface2);border-radius:18px;}
.row{display:flex;align-items:center;gap:12px;}
.between{display:flex;align-items:center;justify-content:space-between;gap:12px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.tag{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:5px 11px;border-radius:999px;background:var(--surface2);color:var(--t2);}
.tag.acc{background:rgba(158,147,242,.16);color:var(--acc);}
.tag.gold{background:rgba(228,197,138,.14);color:var(--gold);}
.metric{background:var(--surface);border-radius:14px;padding:15px 16px;}
.metric .v{font-family:var(--num);font-size:26px;font-weight:600;line-height:1;}
.metric .l{font-size:12px;color:var(--t2);margin-top:6px;}
.btn{background:var(--surface2);border-radius:13px;padding:14px 18px;font-size:15px;font-weight:600;
  display:flex;align-items:center;justify-content:center;gap:9px;width:100%;transition:transform .08s,filter .15s;}
.btn:active{transform:scale(.985);}
.btn.primary{background:var(--acc);color:#191A1B;}
.btn.primary:active{filter:brightness(.94);}
.btn.ghost{background:transparent;border:1px solid var(--border);}
.btn.gold{background:var(--gold);color:#2a2008;}
.btn.sm{width:auto;padding:9px 14px;font-size:13px;border-radius:11px;}
.icbtn{width:38px;height:38px;border-radius:50%;background:var(--surface);display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
.icbtn svg{width:19px;height:19px;}
svg.ic{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;}
.seg{display:flex;background:var(--surface2);border-radius:12px;padding:4px;gap:2px;}
.seg button{flex:1;padding:9px 6px;border-radius:9px;font-size:13px;font-weight:600;color:var(--t2);transition:.15s;}
.seg button.on{background:var(--acc);color:#191A1B;}
.chip{padding:9px 14px;border-radius:999px;background:var(--surface2);font-size:14px;font-weight:600;color:var(--tc);}
.chip.on{background:rgba(158,147,242,.18);color:var(--acc);box-shadow:inset 0 0 0 1px var(--acc);}
.chips{display:flex;flex-wrap:wrap;gap:8px;}
.stone{width:34px;height:34px;border-radius:50%;flex:0 0 auto;box-shadow:inset 0 2px 5px rgba(255,255,255,.3),inset 0 -3px 6px rgba(0,0,0,.35);}
.item{background:var(--surface);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:13px;margin-bottom:10px;}
.item .title{font-weight:600;font-size:15px;color:var(--tp);}
.item .meta{font-size:13px;color:var(--t2);margin-top:2px;}
.item .r{margin-left:auto;display:flex;align-items:center;gap:8px;}
.ring-wrap{display:flex;flex-direction:column;align-items:center;gap:6px;}
.ring{position:relative;width:184px;height:184px;}
.ring .c{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.ring .c b{font-family:var(--num);font-size:38px;font-weight:600;line-height:1;color:var(--tp);}
.ring .c span{font-size:13px;color:var(--t2);margin-top:5px;}
.bars{display:flex;align-items:flex-end;gap:7px;height:120px;padding-top:20px;}
.bars .b{flex:1;background:var(--acc);border-radius:6px 6px 4px 4px;min-height:3px;position:relative;opacity:.85;}
.bars .b.today{opacity:1;background:#B7AEF7;}
.bars .cap{position:absolute;top:-18px;left:0;right:0;text-align:center;font-size:10px;color:var(--t2);}
.bars .lb{position:absolute;bottom:-20px;left:0;right:0;text-align:center;font-size:10px;color:var(--t2);}
.bar{height:7px;background:var(--surface2);border-radius:6px;overflow:hidden;}
.bar>i{display:block;height:100%;background:var(--acc);border-radius:6px;}
.hm{display:grid;grid-auto-flow:column;grid-template-rows:repeat(7,1fr);gap:4px;}
.hm i{width:100%;aspect-ratio:1;border-radius:3px;background:var(--surface2);}
.dyn{display:flex;gap:7px;}
.dyn button{flex:1;padding:10px 0;border-radius:10px;background:var(--surface2);font-family:var(--num);font-style:italic;font-size:17px;font-weight:600;color:var(--t2);}
.dyn button.on{background:var(--acc);color:#191A1B;}
.tl{position:relative;padding-left:22px;}
.tl:before{content:"";position:absolute;left:6px;top:4px;bottom:4px;width:2px;background:var(--surface2);}
.tl .n{position:relative;margin-bottom:16px;}
.tl .n:before{content:"";position:absolute;left:-22px;top:4px;width:10px;height:10px;border-radius:50%;background:var(--acc);box-shadow:0 0 0 3px var(--bg);}
.map{display:flex;gap:2px;height:22px;border-radius:6px;overflow:hidden;background:var(--surface2);}
.map i{display:block;height:100%;border-radius:3px;min-width:3px;}
.map-gap{background:repeating-linear-gradient(45deg,#31353f,#31353f 3px,#272b35 3px,#272b35 6px);}
.sec{background:var(--surface2);border-radius:13px;margin-bottom:8px;overflow:hidden;}
.sec-h{display:flex;align-items:center;gap:11px;padding:12px 14px;}
.sec-dot{width:8px;height:8px;border-radius:50%;flex:0 0 auto;}
.sec-n{font-weight:600;font-size:14px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;background:none;border:none;padding:0;height:auto;}
.sec-r{font-family:var(--num);font-size:15px;font-weight:600;color:var(--tc);flex:0 0 auto;}
.sec-car{color:var(--t2);font-size:11px;width:12px;text-align:center;flex:0 0 auto;}
.sec-todo{font-size:12px;color:var(--t2);padding:0 14px 11px 33px;margin-top:-6px;line-height:1.45;}
.sec-body{padding:2px 14px 14px;border-top:1px solid rgba(255,255,255,.05);}
.mini{background:rgba(0,0,0,.16);border-radius:11px;padding:10px 8px 6px;margin-top:12px;}
.toggle{width:46px;height:28px;border-radius:999px;background:var(--surface2);position:relative;flex:0 0 auto;transition:.2s;}
.toggle:after{content:"";position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:var(--tc);transition:.2s;}
.toggle.on{background:var(--acc);} .toggle.on:after{left:21px;background:#191A1B;}
.toggle.gold.on{background:var(--gold);}
.tabbar{position:fixed;left:0;right:0;bottom:0;max-width:430px;margin:0 auto;
  background:rgba(25,26,27,.82);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border-top:1px solid var(--surface2);display:flex;padding:9px 6px calc(9px + env(safe-area-inset-bottom));z-index:40;}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--t2);font-size:10px;font-weight:600;}
.tab.on{color:var(--acc);}
.tab svg{width:23px;height:23px;fill:none;stroke:currentColor;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;}
.sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:50;display:none;align-items:flex-end;justify-content:center;}
.sheet-bg.show{display:flex;animation:fade .2s;}
.sheet{background:var(--surface);width:100%;max-width:430px;border-radius:24px 24px 0 0;
  box-shadow:0 -18px 50px rgba(0,0,0,.4);padding:8px 20px calc(22px + env(safe-area-inset-bottom));max-height:90vh;overflow-y:auto;overflow-x:hidden;animation:up .25s ease;}
.path{position:relative;}
.rank{display:flex;align-items:center;gap:12px;padding:9px 0;position:relative;}
.rank .dot{width:30px;display:flex;justify-content:center;align-items:center;flex:0 0 auto;z-index:1;}
.grid2{min-width:0;}
@keyframes up{from{transform:translateY(40px);}to{transform:none;}}
@keyframes conffall{to{transform:translateY(112vh) rotate(400deg);opacity:.85;}}
.handle{width:38px;height:4px;border-radius:2px;background:var(--border);margin:8px auto 16px;}
.sheet h3{font-family:var(--serif);font-weight:400;font-size:22px;margin:0 0 14px;}
.field{margin-bottom:14px;} .field>label{display:block;font-size:13px;color:var(--t2);margin-bottom:7px;}
.stepper{display:flex;align-items:center;justify-content:center;gap:16px;}
.stepper button{width:52px;height:52px;border-radius:50%;background:var(--surface2);font-size:24px;}
.stepper .v{font-family:var(--num);font-size:30px;font-weight:600;min-width:120px;text-align:center;}
.toast{position:fixed;left:50%;bottom:118px;transform:translateX(-50%) translateY(16px);background:var(--surface2);
  border:1px solid var(--border);color:var(--tp);padding:12px 18px;border-radius:14px;font-size:14px;font-weight:600;
  opacity:0;transition:.25s;z-index:60;pointer-events:none;max-width:88%;text-align:center;}
.toast.show{opacity:1;transform:translateX(-50%);}
.empty{text-align:center;color:var(--t2);padding:34px 12px;font-size:14px;line-height:1.6;}
.divi{height:1px;background:rgba(255,255,255,.05);margin:14px 0;}
.flame{color:var(--acc);}
a{color:var(--acc);}
.sub{display:flex;justify-content:space-between;font-size:13px;color:var(--t2);}
</style>
</head>
<body>
<div class="app">
  <section id="s-home" class="screen active"></section>
  <section id="s-session" class="screen"></section>
  <section id="s-carnet" class="screen"></section>
  <section id="s-rep" class="screen"></section>
  <section id="s-voyage" class="screen"></section>
  <section id="s-stats" class="screen"></section>
  <section id="s-settings" class="screen"></section>
</div>

<nav class="tabbar" id="tabbar">
  <button class="tab on" data-s="home" onclick="go('home')">
    <svg viewBox="0 0 24 24"><path d="M3 10.5 12 4l9 6.5"/><path d="M5 9.3V20h14V9.3"/></svg>Accueil</button>
  <button class="tab" data-s="carnet" onclick="go('carnet')">
    <svg viewBox="0 0 24 24"><rect x="5" y="3.5" width="14" height="17" rx="2"/><path d="M8.5 8h7M8.5 12h7M8.5 16h4"/></svg>Carnet</button>
  <button class="tab" data-s="rep" onclick="go('rep')">
    <svg viewBox="0 0 24 24"><path d="M9 18V6l10-2v12"/><circle cx="6.5" cy="18" r="2.4"/><circle cx="16.5" cy="16" r="2.4"/></svg>Répertoire</button>
  <button class="tab" data-s="voyage" onclick="go('voyage')">
    <svg viewBox="0 0 24 24"><path d="M4 17c3-6 5-6 8-3M12 6c2 3 4 3 8 1"/><circle cx="18" cy="15" r="2"/><path d="M20 15V8"/></svg>Voyage</button>
  <button class="tab" data-s="stats" onclick="go('stats')">
    <svg viewBox="0 0 24 24"><path d="M4 15l5-5 4 4 7-8"/><path d="M4 20h16"/></svg>Stats</button>
</nav>

<div class="sheet-bg" id="sheet-bg"><div class="sheet" id="sheet"></div></div>
<div class="toast" id="toast"></div>

<script src="opus.js"></script>
<script src="app.js"></script>
</body>
</html>
